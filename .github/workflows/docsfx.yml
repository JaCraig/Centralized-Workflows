name: Document Site Publish

on:
  workflow_call:
    inputs:
      dotnet-version:
        type: string
        description: "The version of the .NET SDK to use"
        required: false
        default: "10.0.x"
      solution:
        type: string
        description: "The solution file to build. If not specified, the default
          discovery is used."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-docs:
    timeout-minutes: 30
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      BUILD_CONFIG: "Release"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [ "${{inputs.dotnet-version}}" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore "${{ inputs.solution }}"

      - name: Build
        run: dotnet build "${{ inputs.solution }}" --no-restore --configuration
          $BUILD_CONFIG

      - run: dotnet tool update -g docfx
      - run: docfx docfx_project/docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docfx_project/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
